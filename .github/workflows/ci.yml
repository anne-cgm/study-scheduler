name: StudyScheduler CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Configurar JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache do Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 🔹 Build Linux/macOS
      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: ./mvnw clean compile

      # 🔹 Build Windows
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: .\mvnw.cmd clean compile

      # 🔹 Lint Linux/macOS
      - name: Lint (Unix)
        if: runner.os != 'Windows'
        run: ./mvnw checkstyle:check

      # 🔹 Lint Windows
      - name: Lint (Windows)
        if: runner.os == 'Windows'
        run: .\mvnw.cmd checkstyle:check

      # 🔹 Testes Linux/macOS
      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: ./mvnw test

      # 🔹 Testes Windows
      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: .\.\mvnw.cmd test